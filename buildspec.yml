 
version: 0.2

env:
  variables:
    AWS_REGION: "us-east-1"
    ECR_REPO_NAME: "brain-tasks-app"
    K8S_NAMESPACE: "default"
    CLUSTER_NAME: "brain-tasks-cluster"
  parameter-store:
    AWS_ACCOUNT_ID: "/codebuild/aws-account-id"

phases:
  install:
    runtime-versions:
      docker: 20
    commands:
      - curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
      - chmod +x kubectl && mv kubectl /usr/local/bin/
  pre_build:
    commands:
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - IMAGE_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO_NAME
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
  build:
    commands:
      - docker build -t $ECR_REPO_NAME:$IMAGE_TAG .
      - docker tag $ECR_REPO_NAME:$IMAGE_TAG $IMAGE_URI:$IMAGE_TAG
      - docker tag $ECR_REPO_NAME:$IMAGE_TAG $IMAGE_URI:latest
  post_build:
    commands:
      - docker push $IMAGE_URI:$IMAGE_TAG
      - docker push $IMAGE_URI:latest
      - aws eks update-kubeconfig --region $AWS_REGION --name $CLUSTER_NAME
      - sed -i "s|<AWS_ACCOUNT_ID>|$AWS_ACCOUNT_ID|g" k8s/deployment.yaml
      - sed -i "s|<AWS_REGION>|$AWS_REGION|g" k8s/deployment.yaml
      - kubectl apply -f k8s/deployment.yaml
      - kubectl apply -f k8s/service.yaml
      - kubectl set image deployment/brain-tasks-app brain-tasks-app=$IMAGE_URI:$IMAGE_TAG -n $K8S_NAMESPACE
      - kubectl rollout status deployment/brain-tasks-app -n $K8S_NAMESPACE --timeout=120s

artifacts:
  files:
    - k8s/deployment.yaml
    - k8s/service.yaml
    - buildspec.yml

logs:
  cloudwatch:
    group-name: "/codebuild/brain-tasks-app"
    stream-name: "build-logs"